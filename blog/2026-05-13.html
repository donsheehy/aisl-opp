<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <base href="/aisl-opp/">
  <title>First day online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap">
  <link rel="stylesheet" href="hljs-github.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
  <link rel="stylesheet" href="style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/contrib/auto-render.min.js"></script>
  <script>
    async function renderMath() {
      const response = await fetch('macros.json');
      const macros = await response.json();
      renderMathInElement(document.body, {
        macros,
        delimiters: [
          { left: "\\[", right: "\\]", display: true },
          { left: "$",   right: "$",   display: false }
        ]
      });
    }
    document.addEventListener("DOMContentLoaded", renderMath);
  </script>
</head>
<body>
  <h1>First day online</h1>
<p>May 13, 2026</p>
<p>This is the first day that the wiki is available online via github pages.
There are many things that are not currently tested.
In particular, we don't know how notes inside folders will work.
This is a note inside a folder.</p>
<p>You can get back to the index here: <a href="/aisl-opp/index.html" class="wikilink">index</a></p>

</body>
</html>
